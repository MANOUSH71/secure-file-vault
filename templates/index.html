<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Secure File Vault Pro - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #00d4aa;
            --dark: #0f0f1a;
            --surface: #1a1a35;
            --border: #2a2a4a;
            --text: #e8e8ff;
            --text-dim: #6666aa;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0d0d20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
        }
        
        .auth-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        .logo h1 {
            color: var(--text);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: var(--text-dim);
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        
        .nav-tabs {
            border: none;
            margin-bottom: 25px;
        }
        
        .nav-tabs .nav-link {
            border: none;
            background: var(--dark);
            color: var(--text-dim);
            border-radius: 10px;
            margin: 0 5px;
            padding: 10px 20px;
            transition: all 0.3s;
        }
        
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        
        .form-control {
            background: var(--dark);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 15px;
        }
        
        .form-control:focus {
            background: var(--dark);
            border-color: var(--primary);
            color: var(--text);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }
        
        .form-label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.4);
        }
        
        .alert {
            border-radius: 10px;
            border: none;
            margin-top: 15px;
        }
        
        .password-strength {
            height: 4px;
            background: var(--dark);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }
        
        .strength-text {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 5px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <h1>Secure File Vault Pro</h1>
            <p>AES-256 · ChaCha20 · RSA · Fernet</p>
        </div>
        
        <ul class="nav nav-tabs justify-content-center" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#login">Login</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#signup">Sign Up</a>
            </li>
        </ul>
        
        <div class="tab-content">
            <!-- Login Tab -->
            <div class="tab-pane fade show active" id="login">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="loginUsername" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt me-2"></i> Login
                    </button>
                </form>
            </div>
            
            <!-- Signup Tab -->
            <div class="tab-pane fade" id="signup">
                <form id="signupForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" id="signupUsername" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="signupPassword" required>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText">—</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus me-2"></i> Create Account
                    </button>
                </form>
            </div>
        </div>
        
        <div id="alertBox"></div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password strength checker
        document.getElementById('signupPassword').addEventListener('input', function(e) {
            const password = e.target.value;
            let score = 0;
            
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;
            
            const labels = ['—', 'Very Weak', 'Weak', 'Fair', 'Good', 'Strong', 'Excellent'];
            const colors = ['#333', '#ff4444', '#ff6644', '#ffaa00', '#88cc00', '#00cc66', '#00ff88'];
            
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            
            bar.style.width = (score / 6 * 100) + '%';
            bar.style.background = colors[score];
            text.textContent = labels[score];
            text.style.color = colors[score];
        });
        
        // Login form
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('success', 'Login successful!');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showAlert('danger', data.error || 'Login failed');
                }
            } catch (error) {
                showAlert('danger', 'Connection error occurred');
            }
        });
        
        // Signup form
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const username = document.getElementById('signupUsername').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showAlert('danger', 'Passwords do not match');
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, first_name: firstName, last_name: lastName})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('success', 'Account created successfully!');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showAlert('danger', data.error || 'Account creation failed');
                }
            } catch (error) {
                showAlert('danger', 'Connection error occurred');
            }
        });
        
        function showAlert(type, message) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
    </script>
</body>
</html>

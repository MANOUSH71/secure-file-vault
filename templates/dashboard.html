<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Secure File Vault Pro - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #00d4aa;
            --danger: #ff4757;
            --dark: #0f0f1a;
            --surface: #1a1a35;
            --surface2: #20203d;
            --border: #2a2a4a;
            --text: #e8e8ff;
            --text-dim: #6666aa;
        }
        
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: var(--surface) !important;
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }
        
        .navbar-brand {
            color: var(--text) !important;
            font-weight: 700;
            font-size: 20px;
        }
        
        .navbar-brand i {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-link {
            color: var(--text-dim) !important;
            margin: 0 10px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            color: var(--primary) !important;
        }
        
        .container-fluid {
            padding: 30px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 99, 255, 0.4);
        }
        
        .btn-danger {
            background: var(--danger);
            border: none;
            border-radius: 8px;
        }
        
        .form-control, .form-select {
            background: var(--dark);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            padding: 12px 15px;
        }
        
        .form-control:focus, .form-select:focus {
            background: var(--dark);
            border-color: var(--primary);
            color: var(--text);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }
        
        .form-label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--dark);
            margin-bottom: 20px;
        }
        
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(108, 99, 255, 0.05);
        }
        
        .drop-zone i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .file-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        
        .file-item:hover {
            border-color: var(--primary);
            transform: translateX(-5px);
        }
        
        .file-icon {
            font-size: 32px;
            width: 50px;
            text-align: center;
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-name {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 5px;
        }
        
        .file-meta {
            font-size: 12px;
            color: var(--text-dim);
        }
        
        .file-badge {
            background: rgba(108, 99, 255, 0.2);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .file-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 8px;
        }
        
        .progress {
            height: 6px;
            background: var(--dark);
            border-radius: 3px;
            margin-top: 10px;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }
        
        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
        }
        
        .modal-header {
            border-bottom: 1px solid var(--border);
        }
        
        .modal-footer {
            border-top: 1px solid var(--border);
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        
        .empty-state i {
            font-size: 64px;
            opacity: 0.3;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-shield-alt"></i> Secure File Vault Pro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fas fa-user"></i> {{ user.first_name }} {{ user.last_name }}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid">
        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-number" id="totalFiles">0</div>
                <div class="stat-label">إجمالي الملفات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalSize">0 MB</div>
                <div class="stat-label">حجم التخزين</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalShares">0</div>
                <div class="stat-label">المشاركات</div>
            </div>
        </div>
        
        <!-- Encrypt Section -->
        <div class="section-card">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-lock"></i> تشفير ملف جديد</h3>
            </div>
            
            <div class="drop-zone" id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <h5>اسحب الملف هنا أو انقر للاختيار</h5>
                <p class="text-muted">الحد الأقصى: 100 ميجابايت</p>
                <input type="file" id="fileInput" style="display: none;">
            </div>
            
            <div id="uploadForm" style="display: none;">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">طريقة التشفير</label>
                        <select class="form-select" id="encryptionMethod">
                            {% for method in encryption_methods %}
                            <option value="{{ method.id }}">{{ method.name }} - {{ method.description }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" class="form-control" id="encryptPassword" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">مفتاح إضافي (اختياري)</label>
                    <input type="text" class="form-control" id="extraKey" placeholder="مفتاح إضافي للأمان">
                </div>
                <div class="progress" id="uploadProgress" style="display: none;">
                    <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
                <button class="btn btn-primary w-100 mt-3" onclick="encryptFile()">
                    <i class="fas fa-lock"></i> تشفير الملف
                </button>
            </div>
        </div>
        
        <!-- Files List -->
        <div class="section-card">
            <div class="section-header">
                <h3 class="section-title"><i class="fas fa-folder"></i> ملفاتي المشفرة</h3>
                <button class="btn btn-primary btn-sm" onclick="loadFiles()">
                    <i class="fas fa-sync"></i> تحديث
                </button>
            </div>
            
            <div id="filesList">
                <div class="empty-state">
                    <i class="fas fa-folder-open"></i>
                    <p>لا توجد ملفات مشفرة بعد</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Decrypt Modal -->
    <div class="modal fade" id="decryptModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-unlock"></i> فك تشفير الملف</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" class="form-control" id="decryptPassword">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">المفتاح الإضافي</label>
                        <input type="text" class="form-control" id="decryptExtraKey">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="performDecrypt()">
                        <i class="fas fa-unlock"></i> فك التشفير وتنزيل
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Share Modal -->
    <div class="modal fade" id="shareModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-share-alt"></i> مشاركة الملف</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">مدة الصلاحية (ساعات)</label>
                        <input type="number" class="form-control" id="shareExpiry" value="24" min="1" max="168">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة مرور للمشاركة (اختياري)</label>
                        <input type="password" class="form-control" id="sharePassword">
                    </div>
                    <div id="shareResult" style="display: none;">
                        <div class="alert alert-success">
                            <strong>رابط المشاركة:</strong>
                            <input type="text" class="form-control mt-2" id="shareUrl" readonly>
                            <button class="btn btn-sm btn-primary mt-2" onclick="copyShareLink()">
                                <i class="fas fa-copy"></i> نسخ الرابط
                            </button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="createShareLink()">
                        <i class="fas fa-link"></i> إنشاء رابط
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedFile = null;
        let currentFileId = null;
        
        // Load stats and files on page load
        window.addEventListener('load', function() {
            loadStats();
            loadFiles();
        });
        
        // Drop zone
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });
        
        function handleFileSelect(file) {
            selectedFile = file;
            document.getElementById('uploadForm').style.display = 'block';
            dropZone.innerHTML = `
                <i class="fas fa-file"></i>
                <h5>${file.name}</h5>
                <p class="text-muted">${formatSize(file.size)}</p>
            `;
        }
        
        async function encryptFile() {
            if (!selectedFile) return;
            
            const password = document.getElementById('encryptPassword').value;
            const extraKey = document.getElementById('extraKey').value;
            const method = document.getElementById('encryptionMethod').value;
            
            if (!password) {
                alert('الرجاء إدخال كلمة المرور');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('password', password);
            formData.append('extra_key', extraKey);
            formData.append('method', method);
            
            const progressBar = document.getElementById('uploadProgress');
            progressBar.style.display = 'block';
            progressBar.querySelector('.progress-bar').style.width = '50%';
            
            try {
                const response = await fetch('/api/encrypt', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    progressBar.querySelector('.progress-bar').style.width = '100%';
                    alert('تم تشفير الملف بنجاح!');
                    resetUploadForm();
                    loadFiles();
                    loadStats();
                } else {
                    alert('خطأ: ' + data.error);
                }
            } catch (error) {
                alert('حدث خطأ في التشفير');
            }
            
            progressBar.style.display = 'none';
        }
        
        function resetUploadForm() {
            selectedFile = null;
            document.getElementById('uploadForm').style.display = 'none';
            document.getElementById('encryptPassword').value = '';
            document.getElementById('extraKey').value = '';
            dropZone.innerHTML = `
                <i class="fas fa-cloud-upload-alt"></i>
                <h5>اسحب الملف هنا أو انقر للاختيار</h5>
                <p class="text-muted">الحد الأقصى: 100 ميجابايت</p>
            `;
        }
        
        async function loadFiles() {
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                
                const filesList = document.getElementById('filesList');
                
                if (data.files.length === 0) {
                    filesList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>لا توجد ملفات مشفرة بعد</p>
                        </div>
                    `;
                    return;
                }
                
                filesList.innerHTML = data.files.map(file => `
                    <div class="file-item">
                        <div class="file-icon">${getFileIcon(file.original_name)}</div>
                        <div class="file-info">
                            <div class="file-name">${file.original_name}</div>
                            <div class="file-meta">
                                ${formatSize(file.size)} · ${new Date(file.created_at).toLocaleDateString('ar')}
                            </div>
                        </div>
                        <span class="file-badge">${file.encryption_method.toUpperCase()}</span>
                        <div class="file-actions">
                            <button class="btn btn-sm btn-primary" onclick="openDecryptModal('${file.file_id}')">
                                <i class="fas fa-unlock"></i> فك التشفير
                            </button>
                            <button class="btn btn-sm btn-success" onclick="openShareModal('${file.file_id}')">
                                <i class="fas fa-share-alt"></i> مشاركة
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteFile('${file.file_id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading files:', error);
            }
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('totalFiles').textContent = data.total_files;
                document.getElementById('totalSize').textContent = formatSize(data.total_size);
                document.getElementById('totalShares').textContent = data.total_shares;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        function openDecryptModal(fileId) {
            currentFileId = fileId;
            new bootstrap.Modal(document.getElementById('decryptModal')).show();
        }
        
        async function performDecrypt() {
            const password = document.getElementById('decryptPassword').value;
            const extraKey = document.getElementById('decryptExtraKey').value;
            
            if (!password) {
                alert('الرجاء إدخال كلمة المرور');
                return;
            }
            
            try {
                const response = await fetch(`/api/decrypt/${currentFileId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password, extra_key: extraKey})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Download the decrypted file
                    window.location.href = `/api/download/${data.temp_file}`;
                    bootstrap.Modal.getInstance(document.getElementById('decryptModal')).hide();
                    document.getElementById('decryptPassword').value = '';
                    document.getElementById('decryptExtraKey').value = '';
                } else {
                    alert('خطأ: ' + data.error);
                }
            } catch (error) {
                alert('حدث خطأ في فك التشفير');
            }
        }
        
        function openShareModal(fileId) {
            currentFileId = fileId;
            document.getElementById('shareResult').style.display = 'none';
            new bootstrap.Modal(document.getElementById('shareModal')).show();
        }
        
        async function createShareLink() {
            const expiresHours = document.getElementById('shareExpiry').value;
            const sharePassword = document.getElementById('sharePassword').value;
            
            try {
                const response = await fetch(`/api/share/${currentFileId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({expires_hours: parseInt(expiresHours), share_password: sharePassword})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('shareUrl').value = data.share_url;
                    document.getElementById('shareResult').style.display = 'block';
                    loadStats();
                } else {
                    alert('خطأ: ' + data.error);
                }
            } catch (error) {
                alert('حدث خطأ في إنشاء رابط المشاركة');
            }
        }
        
        function copyShareLink() {
            const shareUrl = document.getElementById('shareUrl');
            shareUrl.select();
            document.execCommand('copy');
            alert('تم نسخ الرابط!');
        }
        
        async function deleteFile(fileId) {
            if (!confirm('هل أنت متأكد من حذف هذا الملف؟')) return;
            
            try {
                const response = await fetch(`/api/files/${fileId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadFiles();
                    loadStats();
                } else {
                    alert('فشل حذف الملف');
                }
            } catch (error) {
                alert('حدث خطأ في الحذف');
            }
        }
        
        async function logout() {
            try {
                await fetch('/api/logout', {method: 'POST'});
                window.location.href = '/';
            } catch (error) {
                console.error('Logout error:', error);
            }
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }
        
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': '📄', 'doc': '📝', 'docx': '📝', 'txt': '📃',
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                'mp4': '🎬', 'avi': '🎬', 'mp3': '🎵', 'wav': '🎵',
                'zip': '📦', 'rar': '📦', 'xlsx': '📊', 'csv': '📊'
            };
            return icons[ext] || '📁';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Requests - Secure File Vault Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #00d4aa;
            --dark: #0f0f1a;
            --surface: #1a1a35;
            --border: #2a2a4a;
            --text: #e8e8ff;
            --text-dim: #6666aa;
        }
        body {background: var(--dark); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .navbar {background: var(--surface) !important; border-bottom: 1px solid var(--border); padding: 15px 0;}
        .navbar-brand {color: var(--text) !important; font-weight: 700;}
        .nav-link {color: var(--text-dim) !important; margin: 0 10px;}
        .nav-link:hover {color: var(--primary) !important;}
        .section-card {background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 25px;}
        .form-control {background: var(--dark); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 15px;}
        .form-control:focus {background: var(--dark); border-color: var(--primary); color: var(--text); box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);}
        .btn-primary {background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; padding: 10px 20px; font-weight: 600;}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard"><i class="fas fa-shield-alt"></i> Secure File Vault Pro</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/team">Teams</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid p-4">
        <div class="section-card">
            <h3><i class="fas fa-upload"></i> Create File Request</h3>
            <p class="text-muted">Generate a public upload link for others to send you files</p>
            
            <div class="row mt-3">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Maximum Files</label>
                    <input type="number" class="form-control" id="maxFiles" value="1" min="1">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Expires In (hours)</label>
                    <input type="number" class="form-control" id="expiresHours" value="48" min="1">
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="createRequest()">
                <i class="fas fa-link"></i> Generate Upload Link
            </button>
            
            <div id="requestResult" style="display: none;" class="mt-4">
                <div class="alert alert-success">
                    <strong>Upload Link:</strong>
                    <input type="text" class="form-control mt-2" id="requestUrl" readonly>
                    <button class="btn btn-sm btn-primary mt-2" onclick="copyLink()">
                        <i class="fas fa-copy"></i> Copy Link
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function createRequest() {
            const maxFiles = document.getElementById('maxFiles').value;
            const expiresHours = document.getElementById('expiresHours').value;
            
            try {
                const response = await fetch('/api/request/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({max_files: parseInt(maxFiles), expires_hours: parseInt(expiresHours)})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('requestUrl').value = data.request_url;
                    document.getElementById('requestResult').style.display = 'block';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error creating request');
            }
        }
        
        function copyLink() {
            const url = document.getElementById('requestUrl');
            url.select();
            document.execCommand('copy');
            alert('Link copied!');
        }
        
        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            window.location.href = '/';
        }
    </script>
</body>
</html>

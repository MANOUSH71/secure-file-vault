<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Invitation - Secure File Vault Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {--primary: #6c63ff; --secondary: #00d4aa; --dark: #0f0f1a; --surface: #1a1a35; --border: #2a2a4a; --text: #e8e8ff;}
        body {background: var(--dark); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh;}
        .invite-card {background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 40px; max-width: 500px; width: 100%; text-align: center;}
        .btn-primary {background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; padding: 12px 30px; font-weight: 600;}
    </style>
</head>
<body>
    <div class="invite-card">
        <i class="fas fa-users fa-4x mb-4" style="color: var(--primary);"></i>
        <h3>You're Invited!</h3>
        <p class="text-muted">You've been invited to join the team:</p>
        <h4 class="mb-4">{{ invitation.team_name }}</h4>
        
        {% if 'user_id' in session %}
            <button class="btn btn-primary" onclick="acceptInvite()">
                <i class="fas fa-check"></i> Accept Invitation
            </button>
        {% else %}
            <p class="text-muted">Please log in or register to accept this invitation</p>
            <a href="/" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login / Register
            </a>
        {% endif %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = window.location.pathname.split('/').pop();
        
        async function acceptInvite() {
            try {
                const response = await fetch(`/api/invite/${token}/accept`, {method: 'POST'});
                const data = await response.json();
                
                if (response.ok) {
                    alert('Invitation accepted! Redirecting to team page...');
                    window.location.href = '/team';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error accepting invitation');
            }
        }
    </script>
</body>
</html>

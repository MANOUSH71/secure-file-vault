<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - Secure File Vault Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {--primary: #6c63ff; --dark: #0f0f1a; --surface: #1a1a35; --border: #2a2a4a; --text: #e8e8ff; --text-dim: #6666aa;}
        body {background: var(--dark); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .navbar {background: var(--surface) !important; border-bottom: 1px solid var(--border); padding: 15px 0;}
        .navbar-brand {color: var(--text) !important; font-weight: 700;}
        .nav-link {color: var(--text-dim) !important; margin: 0 10px;}
        .section-card {background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 25px;}
        .log-item {background: rgba(108, 99, 255, 0.05); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 14px;}
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard"><i class="fas fa-shield-alt"></i> Secure File Vault Pro</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/team">Teams</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid p-4">
        <div class="section-card">
            <h3><i class="fas fa-clipboard-list"></i> Audit Log</h3>
            <div id="logsList" class="mt-4"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('load', loadLogs);
        
        async function loadLogs() {
            try {
                const response = await fetch('/api/audit');
                const data = await response.json();
                
                const list = document.getElementById('logsList');
                list.innerHTML = data.logs.map(log => `
                    <div class="log-item">
                        <strong>${log.username || 'System'}</strong> • ${log.action} • ${log.entity_type} ${log.entity_id}
                        <br><small class="text-muted">${new Date(log.created_at).toLocaleString()} • IP: ${log.ip_address || 'N/A'}</small>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading logs:', error);
            }
        }
    </script>
</body>
</html>

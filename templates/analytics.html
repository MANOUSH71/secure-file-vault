<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Secure File Vault Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #00d4aa;
            --danger: #ff4757;
            --dark: #0f0f1a;
            --surface: #1a1a35;
            --surface2: #20203d;
            --border: #2a2a4a;
            --text: #e8e8ff;
            --text-dim: #6666aa;
        }
        
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: var(--surface) !important;
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }
        
        .navbar-brand {
            color: var(--text) !important;
            font-weight: 700;
        }
        
        .nav-link {
            color: var(--text-dim) !important;
            margin: 0 10px;
        }
        
        .nav-link:hover {
            color: var(--primary) !important;
        }
        
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-shield-alt"></i> Secure File Vault Pro
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/team">Teams</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid p-4">
        <h2 class="mb-4"><i class="fas fa-chart-bar"></i> Team Analytics: {{ team.name }}</h2>
        
        <div class="row">
            <div class="col-md-6">
                <div class="section-card">
                    <h5>Files Uploaded Over Time (Last 30 Days)</h5>
                    <div class="chart-container">
                        <canvas id="filesOverTimeChart"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="section-card">
                    <h5>Encryption Method Breakdown</h5>
                    <div class="chart-container">
                        <canvas id="encryptionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <div class="section-card">
                    <h5>Storage Per Member</h5>
                    <div class="chart-container">
                        <canvas id="storageChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6">
                <div class="section-card">
                    <h5>Share Link Statistics</h5>
                    <div id="shareStats"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        const teamId = {{ team.id }};
        
        window.addEventListener('load', loadAnalytics);
        
        async function loadAnalytics() {
            try {
                const response = await fetch(`/api/analytics/${teamId}`);
                const data = await response.json();
                
                // Files over time chart
                const filesCtx = document.getElementById('filesOverTimeChart').getContext('2d');
                new Chart(filesCtx, {
                    type: 'line',
                    data: {
                        labels: data.files_over_time.map(d => d.date),
                        datasets: [{
                            label: 'Files Uploaded',
                            data: data.files_over_time.map(d => d.count),
                            borderColor: '#6c63ff',
                            backgroundColor: 'rgba(108, 99, 255, 0.1)',
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {color: '#e8e8ff'}
                            }
                        },
                        scales: {
                            y: {
                                ticks: {color: '#e8e8ff'},
                                grid: {color: '#2a2a4a'}
                            },
                            x: {
                                ticks: {color: '#e8e8ff'},
                                grid: {color: '#2a2a4a'}
                            }
                        }
                    }
                });
                
                // Encryption method chart
                const encryptionCtx = document.getElementById('encryptionChart').getContext('2d');
                new Chart(encryptionCtx, {
                    type: 'doughnut',
                    data: {
                        labels: data.encryption_breakdown.map(d => d.encryption_method.toUpperCase()),
                        datasets: [{
                            data: data.encryption_breakdown.map(d => d.count),
                            backgroundColor: ['#6c63ff', '#00d4aa', '#ff4757', '#ffa502']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {color: '#e8e8ff'}
                            }
                        }
                    }
                });
                
                // Storage per member chart
                const storageCtx = document.getElementById('storageChart').getContext('2d');
                new Chart(storageCtx, {
                    type: 'bar',
                    data: {
                        labels: data.storage_per_member.map(d => d.username),
                        datasets: [{
                            label: 'Storage (MB)',
                            data: data.storage_per_member.map(d => (d.total_size || 0) / 1048576),
                            backgroundColor: '#6c63ff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {color: '#e8e8ff'}
                            }
                        },
                        scales: {
                            y: {
                                ticks: {color: '#e8e8ff'},
                                grid: {color: '#2a2a4a'}
                            },
                            x: {
                                ticks: {color: '#e8e8ff'},
                                grid: {color: '#2a2a4a'}
                            }
                        }
                    }
                });
                
                // Share stats
                document.getElementById('shareStats').innerHTML = `
                    <div class="row text-center">
                        <div class="col-6">
                            <h2 class="text-primary">${data.share_stats.total_shares || 0}</h2>
                            <p class="text-muted">Total Share Links</p>
                        </div>
                        <div class="col-6">
                            <h2 class="text-success">${data.share_stats.total_accesses || 0}</h2>
                            <p class="text-muted">Total Accesses</p>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading analytics:', error);
            }
        }
        
        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            window.location.href = '/';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطأ - Secure File Vault Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0d0d20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e8e8ff;
        }
        
        .error-container {
            text-align: center;
            padding: 40px;
        }
        
        .error-icon {
            font-size: 100px;
            margin-bottom: 30px;
        }
        
        .error-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .error-message {
            font-size: 18px;
            color: #6666aa;
            margin-bottom: 30px;
        }
        
        .btn-home {
            background: linear-gradient(135deg, #6c63ff, #00d4aa);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">❌</div>
        <h1 class="error-title">حدث خطأ</h1>
        <p class="error-message">{{ message }}</p>
        <a href="/" class="btn-home">العودة للصفحة الرئيسية</a>
    </div>
</body>
</html>

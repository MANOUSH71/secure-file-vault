<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File - Secure File Vault Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {--primary: #6c63ff; --secondary: #00d4aa; --dark: #0f0f1a; --surface: #1a1a35; --border: #2a2a4a; --text: #e8e8ff;}
        body {background: var(--dark); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh;}
        .upload-card {background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 40px; max-width: 500px; width: 100%;}
        .form-control {background: var(--dark); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 15px;}
        .btn-primary {background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; padding: 10px 20px; font-weight: 600; width: 100%;}
        .drop-zone {border: 2px dashed var(--border); border-radius: 15px; padding: 40px; text-align: center; cursor: pointer; margin-bottom: 20px;}
        .drop-zone:hover {border-color: var(--primary);}
    </style>
</head>
<body>
    <div class="upload-card">
        <h3 class="text-center mb-4"><i class="fas fa-cloud-upload-alt"></i> Upload File</h3>
        <p class="text-center text-muted">Upload your file securely</p>
        
        <div class="drop-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt fa-3x mb-3" style="color: var(--primary);"></i>
            <p>Drag file here or click to select</p>
            <input type="file" id="fileInput" style="display: none;">
        </div>
        
        <div id="uploadForm" style="display: none;">
            <div class="mb-3">
                <label class="form-label">Password (Optional)</label>
                <input type="password" class="form-control" id="password" placeholder="Leave empty for auto-generated">
            </div>
            <button class="btn btn-primary" onclick="uploadFile()">
                <i class="fas fa-upload"></i> Upload File
            </button>
        </div>
        
        <div id="successMessage" style="display: none;" class="alert alert-success mt-3">
            <i class="fas fa-check-circle"></i> File uploaded successfully!
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = window.location.pathname.split('/').pop();
        let selectedFile = null;
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {e.preventDefault(); dropZone.style.borderColor = 'var(--primary)';});
        dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border)');
        dropZone.addEventListener('drop', (e) => {e.preventDefault(); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);});
        fileInput.addEventListener('change', (e) => {if (e.target.files.length) handleFile(e.target.files[0]);});
        
        function handleFile(file) {
            selectedFile = file;
            dropZone.innerHTML = `<i class="fas fa-file fa-2x mb-2"></i><p>${file.name}</p>`;
            document.getElementById('uploadForm').style.display = 'block';
        }
        
        async function uploadFile() {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('password', document.getElementById('password').value);
            
            try {
                const response = await fetch(`/api/upload/${token}`, {method: 'POST', body: formData});
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('uploadForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Upload error');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Secure File Vault Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #00d4aa;
            --danger: #ff4757;
            --dark: #0f0f1a;
            --surface: #1a1a35;
            --surface2: #20203d;
            --border: #2a2a4a;
            --text: #e8e8ff;
            --text-dim: #6666aa;
        }
        
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: var(--surface) !important;
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }
        
        .navbar-brand {
            color: var(--text) !important;
            font-weight: 700;
        }
        
        .nav-link {
            color: var(--text-dim) !important;
            margin: 0 10px;
        }
        
        .nav-link:hover {
            color: var(--primary) !important;
        }
        
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .notification-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .notification-item:hover {
            border-color: var(--primary);
        }
        
        .notification-item.unread {
            background: rgba(108, 99, 255, 0.1);
            border-color: var(--primary);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="fas fa-shield-alt"></i> Secure File Vault Pro
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/team">Teams</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/notifications">Notifications</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid p-4">
        <div class="section-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3><i class="fas fa-bell"></i> Notifications</h3>
                <button class="btn btn-primary" onclick="markAllRead()">
                    <i class="fas fa-check-double"></i> Mark All Read
                </button>
            </div>
            
            <div id="notificationsList"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('load', loadNotifications);
        
        async function loadNotifications() {
            try {
                const response = await fetch('/api/notifications');
                const data = await response.json();
                
                const list = document.getElementById('notificationsList');
                
                if (data.notifications.length === 0) {
                    list.innerHTML = '<div class="text-center text-muted py-5"><i class="fas fa-bell-slash fa-3x mb-3"></i><p>No notifications</p></div>';
                    return;
                }
                
                list.innerHTML = data.notifications.map(notif => `
                    <div class="notification-item ${notif.is_read ? '' : 'unread'}" onclick="markRead(${notif.id}, '${notif.link}')">
                        <div class="d-flex justify-content-between">
                            <div>
                                <strong>${notif.title}</strong>
                                <p class="mb-1">${notif.message}</p>
                                <small class="text-muted">${new Date(notif.created_at).toLocaleString()}</small>
                            </div>
                            ${!notif.is_read ? '<span class="badge bg-primary">New</span>' : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading notifications:', error);
            }
        }
        
        async function markRead(notifId, link) {
            try {
                await fetch(`/api/notifications/${notifId}/read`, {method: 'POST'});
                if (link) window.location.href = link;
                else loadNotifications();
            } catch (error) {
                console.error('Error marking notification read:', error);
            }
        }
        
        async function markAllRead() {
            try {
                await fetch('/api/notifications/read-all', {method: 'POST'});
                loadNotifications();
            } catch (error) {
                console.error('Error marking all read:', error);
            }
        }
        
        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            window.location.href = '/';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📤 Upload File - Secure Vault Pro</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .upload-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .upload-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }

        .upload-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-header h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .request-details {
            background: var(--light);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .request-details p {
            margin: 10px 0;
            color: var(--dark);
        }

        .request-details strong {
            color: var(--primary);
        }

        .upload-zone {
            border: 3px dashed var(--primary);
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--light);
            margin-bottom: 20px;
        }

        .upload-zone:hover {
            background: #e0e7ff;
            border-color: var(--primary-dark);
        }

        .upload-zone.drag-over {
            background: #e0e7ff;
            border-color: var(--success);
            transform: scale(1.02);
        }

        .file-selected {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #fee;
            color: var(--danger);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .success-message {
            background: #efe;
            color: var(--success);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="upload-page">
        <div class="upload-container">
            <div class="upload-header">
                <h1>📤 Upload File</h1>
                <p>Someone requested files from you</p>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>

            <div id="uploadContent" style="display: none;">
                <div class="request-details">
                    <p><strong>📋 Request:</strong> <span id="requestTitle"></span></p>
                    <p><strong>📊 Files Received:</strong> <span id="filesReceived"></span> / <span id="maxFiles"></span></p>
                    <p><strong>⏰ Expires:</strong> <span id="expiryDate"></span></p>
                </div>

                <div class="upload-zone" id="uploadZone" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                    <div class="upload-icon">📤</div>
                    <p>Drag & Drop file here or click to browse</p>
                    <input type="file" id="fileInput" onchange="handleFileSelect(event)" hidden>
                    <button onclick="document.getElementById('fileInput').click()" class="btn btn-primary">Choose File</button>
                </div>

                <div id="fileSelected" class="file-selected">
                    <strong>Selected:</strong> <span id="fileName"></span> (<span id="fileSize"></span>)
                </div>

                <button id="uploadBtn" onclick="uploadFile()" class="btn btn-success" style="width: 100%; display: none;">
                    📤 Upload File
                </button>
            </div>
        </div>
    </div>

    <script src="crypto.js"></script>
    <script>
        let requestData = null;
        let selectedFile = null;

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showError('Invalid upload link');
        } else {
            loadRequestData();
        }

        function loadRequestData() {
            // Get request from localStorage
            const requests = JSON.parse(localStorage.getItem('vault_file_requests') || '[]');
            requestData = requests.find(r => r.token === token);

            if (!requestData) {
                showError('Upload request not found');
                return;
            }

            // Check expiry
            if (new Date(requestData.expiresAt) < new Date()) {
                showError('This upload request has expired');
                return;
            }

            // Check if max files reached
            if (requestData.filesReceived >= requestData.maxFiles) {
                showError('Maximum number of files reached');
                return;
            }

            // Display request info
            document.getElementById('requestTitle').textContent = requestData.title;
            document.getElementById('filesReceived').textContent = requestData.filesReceived || 0;
            document.getElementById('maxFiles').textContent = requestData.maxFiles;
            document.getElementById('expiryDate').textContent = formatDate(requestData.expiresAt);

            document.getElementById('uploadContent').style.display = 'block';
        }

        function handleDragOver(event) {
            event.preventDefault();
            document.getElementById('uploadZone').classList.add('drag-over');
        }

        function handleDragLeave(event) {
            event.preventDefault();
            document.getElementById('uploadZone').classList.remove('drag-over');
        }

        function handleDrop(event) {
            event.preventDefault();
            document.getElementById('uploadZone').classList.remove('drag-over');
            
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        function processFile(file) {
            if (file.size > 100 * 1024 * 1024) {
                showError('File too large. Maximum size is 100MB');
                return;
            }

            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            document.getElementById('fileSelected').style.display = 'block';
            document.getElementById('uploadBtn').style.display = 'block';
        }

        async function uploadFile() {
            if (!selectedFile) {
                showError('No file selected');
                return;
            }

            showLoading('Uploading file...');

            try {
                // Read file
                const fileData = await readFileAsArrayBuffer(selectedFile);

                // Auto-generate password
                const password = cryptoManager.generateToken(16);

                // Encrypt
                const encryptedData = await cryptoManager.encrypt(
                    new Uint8Array(fileData),
                    password,
                    '',
                    'aes'
                );

                // Save encrypted file
                const fileId = cryptoManager.generateToken(16);
                const fileRecord = {
                    id: fileId,
                    userId: requestData.userId,
                    originalName: selectedFile.name,
                    size: selectedFile.size,
                    encryptedSize: encryptedData.length,
                    method: 'aes',
                    createdAt: new Date().toISOString(),
                    encryptedData: arrayBufferToBase64(encryptedData),
                    uploadedViaRequest: true,
                    requestToken: token,
                    password: password // Store password for requester
                };

                // Save file
                const allFiles = JSON.parse(localStorage.getItem('vault_files') || '[]');
                allFiles.push(fileRecord);
                localStorage.setItem('vault_files', JSON.stringify(allFiles));

                // Update request
                requestData.filesReceived = (requestData.filesReceived || 0) + 1;
                const allRequests = JSON.parse(localStorage.getItem('vault_file_requests') || '[]');
                const index = allRequests.findIndex(r => r.token === token);
                if (index !== -1) {
                    allRequests[index] = requestData;
                    localStorage.setItem('vault_file_requests', JSON.stringify(allRequests));
                }

                hideLoading();
                showSuccess(`File uploaded successfully! Password: ${password}`);

                // Reset
                selectedFile = null;
                document.getElementById('fileInput').value = '';
                document.getElementById('fileSelected').style.display = 'none';
                document.getElementById('uploadBtn').style.display = 'none';
                document.getElementById('filesReceived').textContent = requestData.filesReceived;

            } catch (error) {
                hideLoading();
                showError('Upload failed: ' + error.message);
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('uploadContent').style.display = 'none';
        }

        function showSuccess(message) {
            document.getElementById('successMessage').textContent = message;
            document.getElementById('successMessage').style.display = 'block';
        }

        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }

        function showLoading(message) {
            const overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `
                <div class="loading-content">
                    <div class="spinner"></div>
                    <p>${message}</p>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.remove();
            }
        }
    </script>
</body>
</html>
